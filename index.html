<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f2f2d" />
    <title>Farsi Quest</title>
    <style>
      :root {
        --bg: #0a1117;
        --ink: #fbfcf7;
        --muted: #b5bfca;
        --line: rgba(255, 255, 255, 0.16);
        --line-strong: rgba(255, 255, 255, 0.24);
        --surface: rgba(10, 17, 23, 0.62);
        --surface-soft: rgba(8, 14, 20, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.12);
        --accent: #67e8f9;
        --accent-2: #86efac;
        --accent-3: #f9a8d4;
        --accent-ink: #05201d;
        --gradient-app: linear-gradient(135deg, #071319 0%, #0f2f2d 30%, #26345f 62%, #3a1426 100%);
        --gradient-brand: linear-gradient(135deg, #67e8f9 0%, #86efac 52%, #fde68a 100%);
        --gradient-panel: linear-gradient(135deg, rgba(103, 232, 249, 0.22), rgba(134, 239, 172, 0.14) 46%, rgba(249, 168, 212, 0.18) 100%);
        --gradient-tile-a: linear-gradient(145deg, rgba(103, 232, 249, 0.24), rgba(255, 255, 255, 0.07));
        --gradient-tile-b: linear-gradient(145deg, rgba(134, 239, 172, 0.22), rgba(255, 255, 255, 0.07));
        --gradient-tile-c: linear-gradient(145deg, rgba(249, 168, 212, 0.2), rgba(255, 255, 255, 0.07));
        --gradient-tile-d: linear-gradient(145deg, rgba(253, 230, 138, 0.18), rgba(255, 255, 255, 0.07));
        --gradient-card: linear-gradient(150deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045));
        --gradient-word: linear-gradient(135deg, rgba(103, 232, 249, 0.12), rgba(134, 239, 172, 0.08));
        --gradient-badge: linear-gradient(135deg, rgba(103, 232, 249, 0.26), rgba(134, 239, 172, 0.18));
        --shadow: 0 22px 58px rgba(0, 0, 0, 0.34);
        --font-app: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        --font-fa: "SF Arabic", "Geeza Pro", "Noto Naskh Arabic", "Noto Sans Arabic", Tahoma, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background: var(--gradient-app);
        color: var(--ink);
        font-family: var(--font-app);
      }

      body {
        min-height: 100svh;
      }

      button {
        font: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: 100%;
        min-height: 100svh;
        padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      }

      .view {
        width: min(720px, 100%);
        margin: 0 auto;
      }

      .home-view {
        min-height: calc(100svh - 36px);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .hidden {
        display: none !important;
      }

      .home-top,
      .lesson-top,
      .brand,
      .hero,
      .section-title,
      .word-card,
      .form-meta {
        display: flex;
        align-items: center;
      }

      .home-top,
      .lesson-top,
      .section-title {
        justify-content: space-between;
      }

      .brand {
        min-width: 0;
        gap: 12px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--gradient-brand);
        color: var(--accent-ink);
        font-family: var(--font-fa);
        font-size: 1.7rem;
        font-weight: 900;
        box-shadow: 0 12px 28px rgba(103, 232, 249, 0.22);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.45rem;
        line-height: 1.05;
        font-weight: 950;
      }

      .home-top p,
      .lesson-name,
      .eyebrow,
      .form-label,
      .word-card small,
      .empty-note {
        color: var(--muted);
      }

      .home-top p {
        margin-top: 3px;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .alphabet-grid {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(8, minmax(0, 1fr));
        gap: 9px;
      }

      .alphabet-button,
      .icon-button,
      .word-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
      }

      .alphabet-button {
        min-width: 0;
        min-height: 44px;
        display: grid;
        place-items: center;
        background: var(--gradient-tile-a);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        font-family: var(--font-fa);
        font-size: 2rem;
        font-weight: 900;
        line-height: 1;
        transition:
          transform 150ms ease,
          border-color 150ms ease,
          background 150ms ease;
      }

      .alphabet-button:nth-child(4n + 2) {
        background: var(--gradient-tile-b);
      }

      .alphabet-button:nth-child(4n + 3) {
        background: var(--gradient-tile-c);
      }

      .alphabet-button:nth-child(4n) {
        background: var(--gradient-tile-d);
      }

      .alphabet-button:hover {
        border-color: rgba(255, 255, 255, 0.36);
        filter: brightness(1.12);
      }

      .alphabet-button:active,
      .word-card:active,
      .icon-button:active {
        transform: scale(0.98);
      }

      .alphabet-button:focus-visible,
      .word-card:focus-visible,
      .icon-button:focus-visible {
        outline: 3px solid rgba(103, 232, 249, 0.36);
        outline-offset: 2px;
      }

      .lesson-view {
        min-height: calc(100svh - 36px);
        padding-bottom: 12px;
      }

      .lesson-top {
        gap: 12px;
        margin-bottom: 18px;
      }

      .lesson-actions {
        display: flex;
        gap: 8px;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        background: var(--gradient-card);
        backdrop-filter: blur(16px);
        font-size: 1.4rem;
        font-weight: 950;
      }

      .icon-button.primary {
        background: var(--gradient-brand);
        color: var(--accent-ink);
        border-color: transparent;
      }

      .hero {
        min-height: 178px;
        justify-content: space-between;
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(9, 14, 22, 0.72), rgba(9, 14, 22, 0.5)),
          var(--gradient-panel);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .letter-stack {
        min-width: 0;
      }

      .lesson-name {
        display: block;
        margin-bottom: 6px;
        font-size: 0.86rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .big-letter {
        font-family: var(--font-fa);
        font-size: 7rem;
        line-height: 0.95;
        font-weight: 950;
        direction: rtl;
      }

      .sound-panel {
        min-width: 112px;
        display: grid;
        gap: 8px;
        justify-items: end;
      }

      .eyebrow {
        font-size: 0.74rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .sound-text {
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: var(--accent);
        font-size: 1.05rem;
        font-weight: 950;
        white-space: nowrap;
      }

      .section {
        margin-top: 26px;
        padding-top: 22px;
        position: relative;
      }

      .section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
      }

      .section-title {
        margin-bottom: 14px;
        gap: 12px;
      }

      .section-title h2 {
        font-size: 1.22rem;
        font-weight: 950;
      }

      .section-title span {
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--gradient-badge);
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 900;
      }

      .forms-grid,
      .word-grid {
        display: grid;
        gap: 10px;
      }

      .forms-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-card {
        min-width: 0;
        min-height: 132px;
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(8, 14, 20, 0.66), rgba(8, 14, 20, 0.38)),
          var(--gradient-card);
        backdrop-filter: blur(14px);
      }

      .form-meta {
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .form-label {
        padding: 5px 8px;
        border-radius: 999px;
        background: var(--gradient-badge);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .form-glyph {
        font-family: var(--font-fa);
        font-size: 2.85rem;
        font-weight: 950;
        line-height: 1;
        direction: rtl;
      }

      .form-word {
        display: grid;
        gap: 4px;
      }

      .farsi-word {
        font-family: var(--font-fa);
        font-size: 1.75rem;
        font-weight: 900;
        line-height: 1.15;
        direction: rtl;
        unicode-bidi: isolate;
        white-space: nowrap;
      }

      .form-word small,
      .empty-note {
        font-size: 0.84rem;
        font-weight: 800;
        line-height: 1.25;
      }

      .word-grid {
        grid-template-columns: 1fr;
      }

      .word-card {
        width: 100%;
        min-height: 76px;
        justify-content: space-between;
        gap: 14px;
        padding: 15px;
        text-align: left;
        background:
          linear-gradient(135deg, rgba(8, 14, 20, 0.68), rgba(8, 14, 20, 0.4)),
          var(--gradient-word);
        backdrop-filter: blur(14px);
      }

      .word-card strong {
        display: block;
        font-size: 0.98rem;
        font-weight: 950;
      }

      .word-card small {
        display: block;
        margin-top: 3px;
        font-size: 0.82rem;
        font-weight: 800;
      }

      ::highlight(farsi-letter) {
        color: var(--accent);
        background: transparent;
      }

      @media (min-width: 700px) {
        .home-view {
          min-height: calc(100svh - 48px);
        }

        .alphabet-grid {
          grid-template-columns: repeat(8, minmax(0, 1fr));
          grid-template-rows: repeat(4, minmax(0, 1fr));
          gap: 10px;
        }

        .alphabet-button {
          font-size: 2.15rem;
        }

        .word-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 430px) {
        .app {
          padding: max(14px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        }

        .home-view {
          min-height: calc(100svh - 28px);
          gap: 12px;
        }

        .home-top p {
          display: none;
        }

        .brand-mark {
          width: 40px;
          height: 40px;
          font-size: 1.5rem;
        }

        h1 {
          font-size: 1.28rem;
        }

        .alphabet-grid {
          gap: 7px;
        }

        .alphabet-button {
          min-height: 38px;
          font-size: 1.8rem;
        }

        .hero {
          min-height: 154px;
          padding: 17px;
        }

        .big-letter {
          font-size: 5.5rem;
        }

        .forms-grid {
          gap: 8px;
        }

        .form-card {
          min-height: 124px;
          padding: 12px;
        }

        .form-glyph {
          font-size: 2.4rem;
        }

        .farsi-word {
          font-size: 1.55rem;
        }
      }

      @media (max-height: 620px) {
        .home-top {
          display: none;
        }

        .home-view {
          min-height: calc(100svh - 28px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="view home-view" id="homeView" aria-label="Farsi alphabet">
        <header class="home-top">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">ف</div>
            <div>
              <h1>Farsi Quest</h1>
              <p>Pick a letter</p>
            </div>
          </div>
        </header>

        <div class="alphabet-grid" id="alphabetGrid"></div>
      </section>

      <section class="view lesson-view hidden" id="lessonView" aria-label="Letter lesson">
        <header class="lesson-top">
          <button class="icon-button" id="backButton" type="button" aria-label="Back to alphabet">‹</button>
          <div class="lesson-actions">
            <button class="icon-button primary" id="listenButton" type="button" aria-label="Listen">♪</button>
          </div>
        </header>

        <section class="hero">
          <div class="letter-stack">
            <span class="lesson-name" id="letterName"></span>
            <div class="big-letter" id="letterGlyph" dir="rtl"></div>
          </div>
          <div class="sound-panel">
            <span class="eyebrow">Sound</span>
            <strong class="sound-text" id="soundText"></strong>
          </div>
        </section>

        <section class="section" aria-labelledby="formsTitle">
          <div class="section-title">
            <h2 id="formsTitle">Forms</h2>
            <span id="formsCount"></span>
          </div>
          <div class="forms-grid" id="formsGrid"></div>
        </section>

        <section class="section" aria-labelledby="wordsTitle">
          <div class="section-title">
            <h2 id="wordsTitle">Words</h2>
            <span>Tap to hear</span>
          </div>
          <div class="word-grid" id="wordGrid"></div>
        </section>
      </section>
    </main>

    <script>
      const TATWEEL = "ـ";
      const NON_CONNECTING_AFTER = new Set(["ا", "آ", "أ", "إ", "د", "ذ", "ر", "ز", "ژ", "و"]);

      const LETTERS = [
        { glyph: "ا", name: "alef", sound: "a / aa", sample: "آب", meaning: "water", forms: ["ا", "آ", "ـا"] },
        { glyph: "ب", name: "be", sound: "b", sample: "باد", meaning: "wind", forms: ["ب", "بـ", "ـبـ", "ـب"] },
        { glyph: "پ", name: "pe", sound: "p", sample: "پنجره", meaning: "window", forms: ["پ", "پـ", "ـپـ", "ـپ"] },
        { glyph: "ت", name: "te", sound: "t", sample: "توپ", meaning: "ball", forms: ["ت", "تـ", "ـتـ", "ـت"] },
        { glyph: "ث", name: "se", sound: "s", sample: "ثانیه", meaning: "second", forms: ["ث", "ثـ", "ـثـ", "ـث"] },
        { glyph: "ج", name: "jim", sound: "j", sample: "جام", meaning: "cup", forms: ["ج", "جـ", "ـجـ", "ـج"] },
        { glyph: "چ", name: "che", sound: "ch", sample: "چای", meaning: "tea", forms: ["چ", "چـ", "ـچـ", "ـچ"] },
        { glyph: "ح", name: "he", sound: "h", sample: "حوله", meaning: "towel", forms: ["ح", "حـ", "ـحـ", "ـح"] },
        { glyph: "خ", name: "khe", sound: "kh", sample: "خانه", meaning: "home", forms: ["خ", "خـ", "ـخـ", "ـخ"] },
        { glyph: "د", name: "dal", sound: "d", sample: "دست", meaning: "hand", forms: ["د", "ـد"] },
        { glyph: "ذ", name: "zal", sound: "z", sample: "ذرت", meaning: "corn", forms: ["ذ", "ـذ"] },
        { glyph: "ر", name: "re", sound: "r", sample: "روز", meaning: "day", forms: ["ر", "ـر"] },
        { glyph: "ز", name: "ze", sound: "z", sample: "زرد", meaning: "yellow", forms: ["ز", "ـز"] },
        { glyph: "ژ", name: "zhe", sound: "zh", sample: "ژله", meaning: "jelly", forms: ["ژ", "ـژ"] },
        { glyph: "س", name: "sin", sound: "s", sample: "سیب", meaning: "apple", forms: ["س", "سـ", "ـسـ", "ـس"] },
        { glyph: "ش", name: "shin", sound: "sh", sample: "شب", meaning: "night", forms: ["ش", "شـ", "ـشـ", "ـش"] },
        { glyph: "ص", name: "sad", sound: "s", sample: "صدا", meaning: "sound", forms: ["ص", "صـ", "ـصـ", "ـص"] },
        { glyph: "ض", name: "zad", sound: "z", sample: "ضربه", meaning: "tap", forms: ["ض", "ضـ", "ـضـ", "ـض"] },
        { glyph: "ط", name: "ta", sound: "t", sample: "طناب", meaning: "rope", forms: ["ط", "طـ", "ـطـ", "ـط"] },
        { glyph: "ظ", name: "za", sound: "z", sample: "ظرف", meaning: "dish", forms: ["ظ", "ظـ", "ـظـ", "ـظ"] },
        { glyph: "ع", name: "ayn", sound: "a / e", sample: "عینک", meaning: "glasses", forms: ["ع", "عـ", "ـعـ", "ـع"] },
        { glyph: "غ", name: "gheyn", sound: "gh", sample: "غذا", meaning: "food", forms: ["غ", "غـ", "ـغـ", "ـغ"] },
        { glyph: "ف", name: "fe", sound: "f", sample: "فرش", meaning: "rug", forms: ["ف", "فـ", "ـفـ", "ـف"] },
        { glyph: "ق", name: "qaf", sound: "q / gh", sample: "قلم", meaning: "pen", forms: ["ق", "قـ", "ـقـ", "ـق"] },
        { glyph: "ک", name: "kaf", sound: "k", sample: "کتاب", meaning: "book", forms: ["ک", "کـ", "ـکـ", "ـک"] },
        { glyph: "گ", name: "gaf", sound: "g", sample: "گل", meaning: "flower", forms: ["گ", "گـ", "ـگـ", "ـگ"] },
        { glyph: "ل", name: "lam", sound: "l", sample: "لباس", meaning: "clothes", forms: ["ل", "لـ", "ـلـ", "ـل"] },
        { glyph: "م", name: "mim", sound: "m", sample: "میز", meaning: "table", forms: ["م", "مـ", "ـمـ", "ـم"] },
        { glyph: "ن", name: "nun", sound: "n", sample: "نان", meaning: "bread", forms: ["ن", "نـ", "ـنـ", "ـن"] },
        { glyph: "و", name: "vav", sound: "v / o / u", sample: "وقت", meaning: "time", forms: ["و", "ـو"] },
        { glyph: "ه", name: "he", sound: "h", sample: "هوا", meaning: "weather", forms: ["ه", "هـ", "ـهـ", "ـه"] },
        { glyph: "ی", name: "ye", sound: "y / i", sample: "یخ", meaning: "ice", forms: ["ی", "یـ", "ـیـ", "ـی"] },
      ];

      const WORDS = [
        { fa: "آب", en: "water", translit: "ab" },
        { fa: "باد", en: "wind", translit: "bad" },
        { fa: "پنجره", en: "window", translit: "panjareh" },
        { fa: "توپ", en: "ball", translit: "tup" },
        { fa: "ثانیه", en: "second", translit: "saniyeh" },
        { fa: "جام", en: "cup", translit: "jam" },
        { fa: "چای", en: "tea", translit: "chai" },
        { fa: "حوله", en: "towel", translit: "huleh" },
        { fa: "خانه", en: "home", translit: "khaneh" },
        { fa: "دست", en: "hand", translit: "dast" },
        { fa: "ذرت", en: "corn", translit: "zorrat" },
        { fa: "روز", en: "day", translit: "ruz" },
        { fa: "زرد", en: "yellow", translit: "zard" },
        { fa: "ژله", en: "jelly", translit: "jeleh" },
        { fa: "سیب", en: "apple", translit: "sib" },
        { fa: "شب", en: "night", translit: "shab" },
        { fa: "صدا", en: "sound", translit: "seda" },
        { fa: "ضربه", en: "tap", translit: "zarbeh" },
        { fa: "طناب", en: "rope", translit: "tanab" },
        { fa: "ظرف", en: "dish", translit: "zarf" },
        { fa: "عینک", en: "glasses", translit: "eynak" },
        { fa: "غذا", en: "food", translit: "ghaza" },
        { fa: "فرش", en: "rug", translit: "farsh" },
        { fa: "قلم", en: "pen", translit: "qalam" },
        { fa: "کتاب", en: "book", translit: "ketab" },
        { fa: "گل", en: "flower", translit: "gol" },
        { fa: "لباس", en: "clothes", translit: "lebas" },
        { fa: "میز", en: "table", translit: "miz" },
        { fa: "نان", en: "bread", translit: "nan" },
        { fa: "وقت", en: "time", translit: "vaght" },
        { fa: "هوا", en: "weather", translit: "hava" },
        { fa: "یخ", en: "ice", translit: "yakh" },
        { fa: "باران", en: "rain", translit: "baran" },
        { fa: "دریا", en: "sea", translit: "darya" },
        { fa: "پدر", en: "father", translit: "pedar" },
        { fa: "مادر", en: "mother", translit: "madar" },
        { fa: "بابا", en: "dad", translit: "baba" },
        { fa: "دوست", en: "friend", translit: "dust" },
        { fa: "کوه", en: "mountain", translit: "kuh" },
        { fa: "گلابی", en: "pear", translit: "golabi" },
        { fa: "ستاره", en: "star", translit: "setareh" },
        { fa: "سبز", en: "green", translit: "sabz" },
        { fa: "مدرسه", en: "school", translit: "madreseh" },
        { fa: "ماشین", en: "car", translit: "mashin" },
        { fa: "آژیر", en: "siren", translit: "azhir" },
        { fa: "نردبان", en: "ladder", translit: "nardeban" },
        { fa: "آش", en: "soup", translit: "ash" },
        { fa: "کلید", en: "key", translit: "kelid" },
        { fa: "یخچال", en: "fridge", translit: "yakhchal" },
        { fa: "مداد", en: "pencil", translit: "medad" },
        { fa: "قاشق", en: "spoon", translit: "qashogh" },
        { fa: "انگور", en: "grapes", translit: "angur" },
        { fa: "پل", en: "bridge", translit: "pol" },
        { fa: "نامه", en: "letter", translit: "nameh" },
        { fa: "پنیر", en: "cheese", translit: "panir" },
        { fa: "مو", en: "hair", translit: "mu" },
        { fa: "ماه", en: "moon", translit: "mah" },
        { fa: "ماهی", en: "fish", translit: "mahi" },
      ];

      const FORM_LABELS = {
        isolated: "Alone",
        initial: "Start",
        medial: "Middle",
        final: "End",
      };

      const nodes = {
        homeView: document.getElementById("homeView"),
        lessonView: document.getElementById("lessonView"),
        alphabetGrid: document.getElementById("alphabetGrid"),
        backButton: document.getElementById("backButton"),
        listenButton: document.getElementById("listenButton"),
        letterName: document.getElementById("letterName"),
        letterGlyph: document.getElementById("letterGlyph"),
        soundText: document.getElementById("soundText"),
        formsCount: document.getElementById("formsCount"),
        formsGrid: document.getElementById("formsGrid"),
        wordGrid: document.getElementById("wordGrid"),
      };

      let currentIndex = 0;

      function getFormPosition(form) {
        const joinsBefore = form.startsWith(TATWEEL);
        const joinsAfter = form.endsWith(TATWEEL);
        if (joinsBefore && joinsAfter) return "medial";
        if (joinsAfter) return "initial";
        if (joinsBefore) return "final";
        return "isolated";
      }

      function getHighlightGlyphs(letterGlyph) {
        const letter = LETTERS.find((item) => item.glyph === letterGlyph);
        const forms = letter ? [letter.glyph, ...letter.forms] : [letterGlyph];
        return Array.from(new Set(forms.flatMap((form) => Array.from(form.replaceAll(TATWEEL, ""))).filter(Boolean)));
      }

      function isKnownLetter(character) {
        return LETTERS.some((letter) => getHighlightGlyphs(letter.glyph).includes(character));
      }

      function connectsAfter(character) {
        return isKnownLetter(character) && !NON_CONNECTING_AFTER.has(character);
      }

      function connectsBefore(character) {
        return isKnownLetter(character);
      }

      function getFormForPosition(letter, position, actualCharacter) {
        return (
          letter.forms.find(
            (form) =>
              getFormPosition(form) === position &&
              form.replaceAll(TATWEEL, "") === actualCharacter,
          ) ||
          letter.forms.find((form) => getFormPosition(form) === position) ||
          actualCharacter
        );
      }

      function getLetterOccurrencesInWord(word, letter) {
        const acceptedGlyphs = new Set(getHighlightGlyphs(letter.glyph));
        const characters = Array.from(word.fa);

        return characters.flatMap((character, index) => {
          if (!acceptedGlyphs.has(character)) return [];

          const previous = characters[index - 1];
          const next = characters[index + 1];
          const joinsBefore = Boolean(previous && connectsAfter(previous) && connectsBefore(character));
          const joinsAfter = Boolean(next && connectsAfter(character) && connectsBefore(next));
          const position =
            joinsBefore && joinsAfter
              ? "medial"
              : joinsAfter
                ? "initial"
                : joinsBefore
                  ? "final"
                  : "isolated";

          return [
            {
              word,
              form: getFormForPosition(letter, position, character),
              position,
            },
          ];
        });
      }

      function getWordsForLetter(letter) {
        const acceptedGlyphs = new Set(getHighlightGlyphs(letter.glyph));
        const seen = new Set();
        return WORDS.filter((word) => {
          if (seen.has(word.fa)) return false;
          const hasLetter = Array.from(word.fa).some((character) => acceptedGlyphs.has(character));
          if (hasLetter) seen.add(word.fa);
          return hasLetter;
        });
      }

      function getFormLessons(letter) {
        const examples = getWordsForLetter(letter).flatMap((word) => getLetterOccurrencesInWord(word, letter));
        return letter.forms.map((form) => {
          const example = examples.find((item) => item.form === form);
          return {
            form,
            position: getFormPosition(form),
            example,
          };
        });
      }

      function getFormLabel(letter, form) {
        if (letter.glyph === "ا" && form === "آ") return "Long aa";
        return FORM_LABELS[getFormPosition(form)];
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function audioSlug(value) {
        return value
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function getLetterAudioPath(index, letter) {
        return `audio/letters/${String(index + 1).padStart(2, "0")}-${audioSlug(letter.name)}.mp3`;
      }

      function getWordAudioPath(word) {
        return `audio/words/${audioSlug(word.translit)}.mp3`;
      }

      function wordMarkup(word, letter) {
        const glyphs = getHighlightGlyphs(letter.glyph).join("");
        return `<span class="farsi-word" dir="rtl" data-highlight-glyphs="${escapeHtml(glyphs)}">${escapeHtml(word.fa)}</span>`;
      }

      function renderHome() {
        nodes.alphabetGrid.innerHTML = LETTERS.map(
          (letter, index) =>
            `<button class="alphabet-button" type="button" data-index="${index}" aria-label="${letter.name}">${letter.glyph}</button>`,
        ).join("");
      }

      function renderLetter(index) {
        currentIndex = (index + LETTERS.length) % LETTERS.length;
        const letter = LETTERS[currentIndex];
        const words = getWordsForLetter(letter).slice(0, 4);
        const formLessons = getFormLessons(letter);

        nodes.letterName.textContent = `${letter.name} letter`;
        nodes.letterGlyph.textContent = letter.glyph;
        nodes.soundText.textContent = letter.sound;
        nodes.formsCount.textContent = `${formLessons.length} forms`;

        nodes.formsGrid.innerHTML = formLessons
          .map((lesson) => {
            const detail = lesson.example
              ? `<div class="form-word">${wordMarkup(lesson.example.word, letter)}</div>`
              : `<p class="empty-note">Shown by itself</p>`;

            return `
              <article class="form-card">
                <div class="form-meta">
                  <span class="form-label">${getFormLabel(letter, lesson.form)}</span>
                  <span class="form-glyph" dir="rtl">${lesson.form}</span>
                </div>
                ${detail}
              </article>
            `;
          })
          .join("");

        nodes.wordGrid.innerHTML = words
          .map(
            (word) => `
              <button class="word-card" type="button" data-audio="${getWordAudioPath(word)}" data-speak="${escapeHtml(word.fa)}">
                ${wordMarkup(word, letter)}
                <span>
                  <strong>${escapeHtml(word.en)}</strong>
                  <small>${escapeHtml(word.translit)}</small>
                </span>
              </button>
            `,
          )
          .join("");

        nodes.homeView.classList.add("hidden");
        nodes.lessonView.classList.remove("hidden");
        applyTextHighlights();
      }

      function showHome() {
        nodes.lessonView.classList.add("hidden");
        nodes.homeView.classList.remove("hidden");
        if (location.hash) {
          history.pushState("", document.title, location.pathname + location.search);
        }
      }

      function syncRoute() {
        const match = location.hash.match(/^#letter-(\d+)$/);
        if (!match) {
          showHome();
          return;
        }

        const index = Number(match[1]);
        if (Number.isInteger(index) && index >= 0 && index < LETTERS.length) {
          renderLetter(index);
        } else {
          showHome();
        }
      }

      function goToLetter(index) {
        const nextIndex = (index + LETTERS.length) % LETTERS.length;
        location.hash = `letter-${nextIndex}`;
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "fa-IR";
        utterance.rate = 0.82;
        utterance.pitch = 1.05;
        const voices = window.speechSynthesis.getVoices();
        utterance.voice = voices.find((voice) => voice.lang.toLowerCase().startsWith("fa")) || null;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      let activeAudio = null;

      function playAudio(path, fallbackText) {
        if (activeAudio) {
          activeAudio.pause();
          activeAudio.currentTime = 0;
        }

        activeAudio = new Audio(path);
        activeAudio.play().catch(() => speak(fallbackText));
      }

      function applyTextHighlights() {
        if (!("Highlight" in window) || !("CSS" in window) || !CSS.highlights) return;

        const ranges = [];
        document.querySelectorAll(".farsi-word[data-highlight-glyphs]").forEach((element) => {
          const highlightSet = new Set(Array.from(element.dataset.highlightGlyphs || ""));
          const textNode = element.firstChild;
          if (!textNode || textNode.nodeType !== Node.TEXT_NODE) return;

          let offset = 0;
          Array.from(textNode.textContent || "").forEach((character) => {
            const nextOffset = offset + character.length;
            if (highlightSet.has(character)) {
              const range = new Range();
              range.setStart(textNode, offset);
              range.setEnd(textNode, nextOffset);
              ranges.push(range);
            }
            offset = nextOffset;
          });
        });

        CSS.highlights.set("farsi-letter", new Highlight(...ranges));
      }

      nodes.alphabetGrid.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-index]");
        if (!button) return;
        goToLetter(Number(button.dataset.index));
      });

      nodes.backButton.addEventListener("click", showHome);
      nodes.listenButton.addEventListener("click", () => {
        const letter = LETTERS[currentIndex];
        playAudio(getLetterAudioPath(currentIndex, letter), `حرف ${letter.glyph}`);
      });
      nodes.wordGrid.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-audio]");
        if (!button) return;
        playAudio(button.dataset.audio, button.dataset.speak);
      });

      window.addEventListener("hashchange", syncRoute);
      window.speechSynthesis?.addEventListener?.("voiceschanged", () => {});

      renderHome();
      syncRoute();
    </script>
  </body>
</html>
