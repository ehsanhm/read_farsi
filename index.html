<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" />
    <title>Farsi Quest</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --ink: #f8fafc;
        --muted: #a8afbd;
        --surface: #17171d;
        --surface-raised: #202029;
        --surface-soft: #262631;
        --border: rgba(255, 255, 255, 0.1);
        --brand: #f5b84b;
        --brand-soft: rgba(245, 184, 75, 0.16);
        --success: #2dd4bf;
        --success-soft: rgba(45, 212, 191, 0.15);
        --danger: #fb7185;
        --font-app: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-fa: "SF Arabic", "Geeza Pro", "Noto Naskh Arabic", "Noto Sans Arabic", Tahoma, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      html,
      body {
        width: 100%;
        max-width: 100%;
        margin: 0;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-app);
      }

      button {
        font: inherit;
      }

      .app {
        width: 100%;
        max-width: 100%;
        min-height: 100svh;
        overflow-x: hidden;
        padding: 22px max(16px, env(safe-area-inset-right)) 22px max(16px, env(safe-area-inset-left));
        background: var(--bg);
      }

      .shell {
        width: min(680px, 100%);
        min-width: 0;
        max-width: 100%;
        margin: 0 auto;
      }

      .header,
      .brand,
      .toolbar,
      .lesson-side,
      .path-nav,
      .actions {
        display: flex;
        align-items: center;
      }

      .header {
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .brand {
        gap: 11px;
        min-width: 0;
      }

      .brand > div {
        min-width: 0;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        background: var(--brand);
        color: #1f1304;
        font-family: var(--font-fa);
        font-size: 1.55rem;
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.55rem;
        font-weight: 900;
        line-height: 1.05;
      }

      h1,
      .header p {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .header p,
      .summary span,
      .summary small,
      .kicker,
      .choice-detail,
      .alphabet-focus p,
      .sheet-header p,
      .feedback small {
        color: var(--muted);
      }

      .header p {
        margin-top: 3px;
        font-size: 0.88rem;
        font-weight: 800;
      }

      .text-button,
      .path-nav-button,
      .small-action,
      .continue-button,
      .close-button {
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 900;
      }

      .text-button {
        flex: 0 0 auto;
        min-height: 40px;
        padding: 0 13px;
        border: 1px solid var(--border);
        background: var(--surface-raised);
        color: var(--ink);
        white-space: nowrap;
      }

      .progress {
        height: 11px;
        margin-bottom: 16px;
        border-radius: 8px;
        overflow: hidden;
        background: #272733;
      }

      .progress span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--brand);
        transition: width 220ms ease;
      }

      .card,
      .alphabet-sheet {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
      }

      .card {
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        padding: 18px;
      }

      .toolbar {
        min-width: 0;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
      }

      .summary {
        display: grid;
        gap: 4px;
      }

      .summary span {
        font-size: 0.72rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .summary strong {
        color: var(--ink);
        font-size: 1.18rem;
        font-weight: 900;
        line-height: 1.06;
      }

      .summary small {
        font-size: 0.84rem;
        font-weight: 900;
      }

      .lesson-side {
        justify-content: flex-end;
      }

      .path-nav {
        gap: 8px;
      }

      .path-nav-button {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--border);
        background: #101014;
        color: var(--ink);
      }

      .path-nav-button:disabled,
      .continue-button:disabled {
        cursor: not-allowed;
        opacity: 0.36;
      }

      .question {
        min-width: 0;
        text-align: center;
      }

      .kicker {
        margin-bottom: 8px;
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .question h2 {
        margin: 0 auto 18px;
        max-width: 540px;
        color: var(--ink);
        font-size: 2rem;
        font-weight: 900;
        line-height: 1.14;
      }

      .prompt-card {
        position: relative;
        width: 100%;
        min-width: 0;
        max-width: 100%;
        min-height: 190px;
        overflow: hidden;
        border: 2px solid var(--border);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #101014;
        color: var(--ink);
        cursor: default;
        font-family: var(--font-fa);
        font-size: 6rem;
        font-weight: 800;
        line-height: 1;
        box-shadow:
          inset 0 -6px 0 rgba(255, 255, 255, 0.04),
          0 14px 28px rgba(0, 0, 0, 0.22);
        user-select: none;
        transition:
          border-color 150ms ease,
          transform 150ms ease;
      }

      .prompt-card:hover,
      .prompt-card:focus-visible,
      .answer:hover,
      .answer:focus-visible {
        border-color: var(--brand);
        outline: 3px solid rgba(245, 184, 75, 0.18);
        outline-offset: 2px;
      }

      .prompt-card:hover,
      .prompt-card:focus-visible {
        border-color: var(--border);
        outline: none;
        transform: none;
      }

      .prompt-content {
        display: block;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        padding: 42px 18px 16px;
        text-align: center;
      }

      .prompt-icon-button {
        position: absolute;
        top: 12px;
        width: 44px;
        height: 44px;
        border: 1px solid var(--border);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--surface-raised);
        color: var(--ink);
        cursor: pointer;
      }

      .prompt-icon-button:hover,
      .prompt-icon-button:focus-visible,
      .prompt-icon-button.active {
        border-color: var(--brand);
        color: var(--brand);
        outline: 3px solid rgba(245, 184, 75, 0.16);
        outline-offset: 2px;
      }

      .prompt-icon-button svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
      }

      .prompt-listen {
        right: 12px;
      }

      .prompt-hint {
        left: 12px;
      }

      .highlighted-farsi-word {
        display: inline-block;
        max-width: 100%;
        white-space: nowrap;
        word-break: keep-all;
        overflow-wrap: normal;
        direction: rtl;
      }

      .prompt-card .highlighted-farsi-word {
        display: inline-block;
      }

      .hint {
        display: none;
        margin: 12px auto 0;
        max-width: 480px;
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--brand-soft);
        color: #f8d48c;
        font-weight: 850;
      }

      .hint.visible {
        display: block;
      }

      .answer-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-width: 0;
        max-width: 100%;
        gap: 12px;
      }

      .answer {
        min-width: 0;
        min-height: 96px;
        border: 2px solid #3a3a46;
        border-bottom-width: 5px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 5px;
        padding: 12px;
        background: var(--surface-raised);
        color: var(--ink);
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          background 120ms ease;
      }

      .answer:hover,
      .answer:focus-visible {
        transform: translateY(-1px);
      }

      .answer.correct {
        border-color: var(--success);
        background: #102522;
        color: #dffcf7;
      }

      .answer.wrong {
        border-color: var(--danger);
        background: #2a1218;
        color: #ffe4e9;
      }

      .choice-icon {
        min-height: 24px;
        font-size: 1.45rem;
      }

      .choice-label {
        max-width: 100%;
        min-width: 0;
        color: inherit;
        font-family: var(--font-fa);
        font-size: 2.15rem;
        font-weight: 800;
        line-height: 1.04;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .answer[dir="ltr"] .choice-label {
        font-family: var(--font-app);
        font-size: 1.18rem;
        font-weight: 850;
      }

      .choice-detail {
        font-size: 0.78rem;
        font-weight: 900;
      }

      .feedback {
        min-width: 0;
        max-width: 100%;
        min-height: 64px;
        margin-top: 16px;
        border-radius: 8px;
        padding: 10px 10px 10px 14px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        background: var(--surface-raised);
        color: var(--ink);
        font-weight: 900;
      }

      .feedback.correct {
        background: var(--success-soft);
        color: #a7f3d0;
      }

      .feedback.wrong {
        background: rgba(251, 113, 133, 0.14);
        color: #fecdd3;
      }

      .feedback small {
        display: block;
        margin-top: 3px;
        font-weight: 800;
      }

      .continue-button {
        min-height: 44px;
        padding: 0 18px;
        background: var(--brand);
        color: #1f1304;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        place-items: end center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.64);
      }

      .overlay.open {
        display: grid;
      }

      .alphabet-sheet {
        width: min(620px, 100%);
        min-width: 0;
        max-height: min(760px, 94svh);
        overflow: hidden;
        padding: 18px;
      }

      .sheet-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .sheet-header p {
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .sheet-header h2 {
        color: var(--ink);
        font-size: 1.5rem;
        font-weight: 900;
      }

      .close-button {
        width: 40px;
        height: 40px;
        background: var(--surface-raised);
        color: var(--ink);
        font-size: 1.35rem;
      }

      .alphabet-focus {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .focus-letter {
        width: 84px;
        height: 84px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--brand);
        color: #1f1304;
        font-family: var(--font-fa);
        font-size: 3rem;
        font-weight: 800;
      }

      .alphabet-focus p {
        margin: 4px 0;
        font-weight: 850;
      }

      .focus-word {
        color: var(--ink);
        font-family: var(--font-fa);
        font-size: 1.55rem;
        font-weight: 800;
      }

      .shape-row {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .shape-row span {
        min-height: 40px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--surface-soft);
        color: var(--ink);
        font-family: var(--font-fa);
        font-size: 1.25rem;
        font-weight: 800;
      }

      .letter-grid {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 7px;
      }

      .letter-tile {
        aspect-ratio: 1;
        min-width: 0;
        border: 2px solid var(--border);
        border-radius: 8px;
        background: var(--surface-raised);
        color: var(--ink);
        cursor: pointer;
        font-family: var(--font-fa);
        font-size: 1.2rem;
        font-weight: 800;
      }

      .letter-tile.active {
        border-color: var(--brand);
        background: var(--brand-soft);
        color: #fde68a;
      }

      @media (max-width: 620px) {
        .app {
          padding:
            max(12px, env(safe-area-inset-top))
            max(10px, env(safe-area-inset-right))
            max(12px, env(safe-area-inset-bottom))
            max(10px, env(safe-area-inset-left));
        }

        .header {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: center;
          gap: 8px;
          margin-bottom: 12px;
        }

        .logo {
          width: 38px;
          height: 38px;
          font-size: 1.35rem;
        }

        h1 {
          font-size: 1.3rem;
        }

        .header p {
          font-size: 0.78rem;
        }

        .text-button {
          min-height: 36px;
          padding: 0 10px;
          font-size: 0.86rem;
        }

        .card {
          padding: 13px;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
          gap: 10px;
          margin-bottom: 16px;
        }

        .lesson-side {
          display: grid;
          grid-template-columns: 1fr;
          justify-content: stretch;
        }

        .path-nav {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .path-nav-button {
          width: 100%;
        }

        .question h2 {
          margin-bottom: 14px;
          font-size: 1.38rem;
        }

        .prompt-card {
          min-height: 148px;
          font-size: 4.35rem;
        }

        .prompt-content {
          padding: 40px 12px 14px;
        }

        .prompt-card .highlighted-farsi-word {
          font-size: 0.82em;
        }

        .answer-grid {
          gap: 9px;
        }

        .answer {
          min-height: 88px;
          padding: 10px 8px;
        }

        .choice-label {
          font-size: 1.8rem;
        }

        .answer[dir="ltr"] .choice-label {
          font-size: 1rem;
        }

        .feedback {
          grid-template-columns: 1fr;
        }

        .continue-button {
          width: 100%;
        }

        .overlay {
          padding: 8px;
        }

        .alphabet-sheet {
          max-height: calc(100svh - 16px);
          padding: 12px;
        }

        .sheet-header {
          align-items: center;
          gap: 8px;
          margin-bottom: 8px;
        }

        .sheet-header p {
          font-size: 0.66rem;
        }

        .sheet-header h2 {
          font-size: 1.12rem;
        }

        .close-button {
          width: 34px;
          height: 34px;
          font-size: 1.12rem;
        }

        .alphabet-focus {
          grid-template-columns: 64px minmax(0, 1fr);
          gap: 8px;
          margin-bottom: 10px;
        }

        .focus-letter {
          width: 64px;
          height: 64px;
          font-size: 2.3rem;
        }

        .alphabet-focus p {
          margin: 2px 0;
          font-size: 0.74rem;
          line-height: 1.12;
        }

        .focus-word {
          font-size: 1.42rem;
          line-height: 1.05;
        }

        .shape-row {
          gap: 5px;
        }

        .shape-row span {
          min-height: 30px;
          font-size: 1.12rem;
        }

        .letter-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
          gap: 6px;
        }

        .letter-tile {
          font-size: 1.28rem;
        }
      }

      @media (max-width: 380px) {
        .app {
          padding-right: max(8px, env(safe-area-inset-right));
          padding-left: max(8px, env(safe-area-inset-left));
        }

        .header p {
          display: none;
        }

        .logo {
          width: 34px;
          height: 34px;
          font-size: 1.2rem;
        }

        .card {
          padding: 11px;
        }

        .alphabet-sheet {
          padding: 9px;
        }

        .alphabet-focus {
          grid-template-columns: 56px minmax(0, 1fr);
        }

        .focus-letter {
          width: 56px;
          height: 56px;
          font-size: 2rem;
        }

        .focus-word {
          font-size: 1.28rem;
        }

        .shape-row span {
          min-height: 28px;
          font-size: 1.04rem;
        }

        .prompt-card {
          min-height: 132px;
          font-size: 3.45rem;
        }

        .prompt-content {
          padding-bottom: 12px;
        }

        .prompt-card .highlighted-farsi-word {
          font-size: 0.76em;
        }

        .answer {
          min-height: 78px;
        }

        .choice-label {
          font-size: 1.55rem;
        }
      }

      @media (max-width: 340px) {
        .answer-grid,
        .path-nav {
          grid-template-columns: 1fr;
        }

        .question h2 {
          font-size: 1.22rem;
        }

        .letter-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="app">
      <div class="shell">
        <header class="header">
          <div class="brand">
            <span class="logo" dir="rtl" aria-hidden="true">ف</span>
            <div>
              <h1>Farsi Quest</h1>
              <p>Guided reading path</p>
            </div>
          </div>
          <button class="text-button" id="alphabetButton" type="button">Alphabet</button>
        </header>

        <div class="progress" aria-label="Round progress">
          <span id="progressBar"></span>
        </div>

        <section class="card">
          <div class="toolbar">
            <div class="summary">
              <span id="stepLabel"></span>
              <strong id="lessonTitle"></strong>
              <small id="letterLabel"></small>
            </div>
            <div class="lesson-side">
              <div class="path-nav" aria-label="Lesson navigation">
                <button class="path-nav-button" id="backButton" type="button">Back</button>
                <button class="path-nav-button" id="forwardButton" type="button">Forward</button>
              </div>
            </div>
          </div>

          <div class="question">
            <p class="kicker" id="kicker"></p>
            <h2 id="prompt"></h2>
            <div class="prompt-card" id="promptCard" dir="rtl">
              <button class="prompt-icon-button prompt-hint" id="hintButton" type="button" aria-label="Show hint">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9 18h6" stroke-width="2" stroke-linecap="round" />
                  <path d="M10 22h4" stroke-width="2" stroke-linecap="round" />
                  <path d="M8.5 14.5c-1.5-1.1-2.5-2.9-2.5-5a6 6 0 1 1 12 0c0 2.1-1 3.9-2.5 5-.9.7-1.2 1.4-1.2 2.5H9.7c0-1.1-.3-1.8-1.2-2.5Z" stroke-width="2" stroke-linejoin="round" />
                </svg>
              </button>
              <button class="prompt-icon-button prompt-listen" id="listenButton" type="button" aria-label="Listen">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 9v6h4l5 4V5L8 9H4Z" stroke-width="2" stroke-linejoin="round" />
                  <path d="M16.5 8.5a5 5 0 0 1 0 7" stroke-width="2" stroke-linecap="round" />
                  <path d="M19 6a8.5 8.5 0 0 1 0 12" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <span class="prompt-content" id="promptContent"></span>
            </div>
            <p class="hint" id="hint"></p>
          </div>

          <div class="answer-grid" id="answerGrid"></div>

          <div class="feedback" id="feedback" aria-live="polite">
            <span id="feedbackText"></span>
            <button class="continue-button" id="continueButton" type="button">Continue</button>
          </div>
        </section>
      </div>
    </main>

    <div class="overlay" id="alphabetOverlay" role="dialog" aria-modal="true">
      <section class="alphabet-sheet" aria-label="Alphabet lab">
        <div class="sheet-header">
          <div>
            <p>Alphabet</p>
            <h2 id="focusName"></h2>
          </div>
          <button class="close-button" id="closeAlphabetButton" type="button" aria-label="Close alphabet">×</button>
        </div>

        <div class="alphabet-focus">
          <span class="focus-letter" id="focusGlyph" dir="rtl"></span>
          <div>
            <p id="focusSound"></p>
            <p class="focus-word" id="focusWord" dir="rtl"></p>
            <p id="focusMeaning"></p>
          </div>
          <div class="shape-row" id="shapeRow" dir="rtl" aria-label="Letter shapes"></div>
        </div>

        <div class="letter-grid" id="letterGrid" dir="rtl"></div>
      </section>
    </div>

    <script>
      const STORAGE_KEY = "farsi-reading-quest-progress";

      const MODES = {
        letters: { title: "Letter Pop" },
        shapes: { title: "Shape Shift" },
        words: { title: "Word Match" },
        meaning: { title: "Reading Sprint" },
      };
      const LESSON_FLOW = ["letters", "shapes", "words", "meaning"];

      const LETTERS = [
        { glyph: "ا", name: "alef", sound: "a / aa", sample: "آب", meaning: "water", forms: ["ا", "آ", "ـا"] },
        { glyph: "ب", name: "be", sound: "b", sample: "باد", meaning: "wind", forms: ["ب", "بـ", "ـبـ", "ـب"] },

      function seedFor(mode, roundIndex) {
        const modeValue = Array.from(mode).reduce((total, letter) => total + letter.charCodeAt(0), 0);
        return (roundIndex + 3) * 997 + modeValue * 37;
      }

      function seededRandom(seed) {
        let value = seed % 2147483647;
        if (value <= 0) value += 2147483646;
        return () => {
          value = (value * 16807) % 2147483647;
          return (value - 1) / 2147483646;
        };
      }

      function shuffleWithSeed(items, seed) {
        const shuffled = [...items];
        const random = seededRandom(seed);
        for (let index = shuffled.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(random() * (index + 1));
          [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
        }
        return shuffled;
      }

      function mixChoices(correct, distractors, seed) {
        return shuffleWithSeed([correct, ...distractors], seed);

      function getHighlightGlyphs(letterGlyph) {
        const letter = LETTERS.find((item) => item.glyph === letterGlyph);
        const forms = letter ? [letter.glyph, ...letter.forms] : [letterGlyph];
        return Array.from(new Set(forms.flatMap((form) => Array.from(form.replaceAll(TATWEEL, ""))).filter(Boolean)));

      function getFormPosition(form) {
        const joinsBefore = form.startsWith(TATWEEL);
        const joinsAfter = form.endsWith(TATWEEL);

        if (joinsBefore && joinsAfter) return "medial";
        if (joinsAfter) return "initial";
        if (joinsBefore) return "final";
        return "isolated";
      }

      function isKnownLetter(character) {
        return LETTERS.some((letter) => getHighlightGlyphs(letter.glyph).includes(character));
      }

      function connectsAfter(character) {
        return isKnownLetter(character) && !NON_CONNECTING_AFTER.has(character);
      }

      function connectsBefore(character) {
        return isKnownLetter(character);
      }

      function getFormForPosition(letter, position, actualCharacter) {
        return (
          letter.forms.find(
            (form) =>
              getFormPosition(form) === position &&
              form.replaceAll(TATWEEL, "") === actualCharacter,
          ) ||
          letter.forms.find((form) => getFormPosition(form) === position) ||
          actualCharacter
        );
      }

      function getLetterOccurrencesInWord(word, letter) {
        const acceptedGlyphs = new Set(getHighlightGlyphs(letter.glyph));
        const characters = Array.from(word.fa);

        return characters.flatMap((character, index) => {
          if (!acceptedGlyphs.has(character)) return [];

          const previous = characters[index - 1];
          const next = characters[index + 1];
          const joinsBefore = Boolean(previous && connectsAfter(previous) && connectsBefore(character));
          const joinsAfter = Boolean(next && connectsAfter(character) && connectsBefore(next));
          const position =
            joinsBefore && joinsAfter
              ? "medial"
              : joinsAfter
                ? "initial"
                : joinsBefore
                  ? "final"
                  : "isolated";

          return [
            {
              word,
              form: getFormForPosition(letter, position, character),
              position,
            },
          ];
        });
      }

      function getShapeExampleForLetter(letter, roundIndex) {
        const desiredForm = letter.forms[roundIndex % letter.forms.length] || letter.glyph;
        const desiredPosition = getFormPosition(desiredForm);
        const examples = getShapeExamplesForLetter(letter);
        const exactFormExamples = examples.filter((example) => example.form === desiredForm);
        const matchingExamples =
          exactFormExamples.length > 0
            ? exactFormExamples
            : examples.filter((example) => example.position === desiredPosition);
        const candidates = matchingExamples.length > 0 ? matchingExamples : examples;

        return (
          candidates[roundIndex % Math.max(candidates.length, 1)] || {
            word: {
              fa: letter.sample,
              en: letter.meaning,
              translit: letter.name,
              letter: letter.glyph,
              icon: "",
            },
            form: desiredForm,
            position: desiredPosition,
          }
        );
      }

      function getShapeExamplesForLetter(letter) {
        const examples = getPracticeWordsForLetter(letter.glyph).flatMap((word) =>

        return examples.length > 0

          : [

                  translit: letter.name,

                  icon: "",

                form: letter.forms[0] || letter.glyph,
                position: getFormPosition(letter.forms[0] || letter.glyph),

      function getShapeExampleKey(example) {
        return `${example.word.fa}-${example.form}-${example.position}`;

      function uniqueShapeExamples(examples) {
        const seen = new Set();
        return examples.filter((example) => {
          const key = getShapeExampleKey(example);
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function getShapeChoiceExamples(letter, promptExample, seed) {
        const examples = uniqueShapeExamples(getShapeExamplesForLetter(letter));
        const matchingExamples = examples.filter((example) => example.form === promptExample.form);
        const correct =
          matchingExamples.find((example) => example.word.fa !== promptExample.word.fa) || promptExample;
        const usedKeys = new Set([getShapeExampleKey(correct)]);
        const usedPositions = new Set([promptExample.position]);
        const distractors = [];

        for (const example of shuffleWithSeed(
          examples.filter((item) => item.form !== promptExample.form),
          seed,
        )) {
          const key = getShapeExampleKey(example);
          if (usedKeys.has(key)) continue;
          if (usedPositions.has(example.position) && distractors.length < 3) continue;

          distractors.push(example);
          usedKeys.add(key);
          usedPositions.add(example.position);
          if (distractors.length === 3) break;
        }

        if (distractors.length < 3) {
          for (const example of shuffleWithSeed(examples, seed + 5)) {
            const key = getShapeExampleKey(example);
            if (usedKeys.has(key) || example.form === promptExample.form) continue;

            distractors.push(example);
            usedKeys.add(key);
            if (distractors.length === 3) break;
          }
        }

        return { correct, distractors };
      }

        if (!("CSS" in window) || !("highlights" in CSS) || !("Highlight" in window)) {
          return;

        ensureTextHighlightStyle();

        const ranges = [];
        document.querySelectorAll(".highlighted-farsi-word[data-highlight-glyphs]").forEach((element) => {
          const textNode = element.firstChild;
          if (!textNode || textNode.nodeType !== Node.TEXT_NODE) return;

          const text = textNode.textContent || "";
          const highlightSet = new Set(Array.from(element.getAttribute("data-highlight-glyphs") || ""));
          let offset = 0;

          Array.from(text).forEach((character) => {
            const nextOffset = offset + character.length;
            if (highlightSet.has(character)) {
              const range = new Range();
              range.setStart(textNode, offset);
              range.setEnd(textNode, nextOffset);
              ranges.push(range);
            }
            offset = nextOffset;
          });
        });

        CSS.highlights.set("farsi-teaching-letter", new Highlight(...ranges));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getPathMode(stepIndex) {
        return LESSON_FLOW[stepIndex % LESSON_FLOW.length];
      }

      function getTopicIndex(stepIndex) {
        return Math.floor(stepIndex / LESSON_FLOW.length);
      }

      function createPathRound(stepIndex) {
        return createRound(getPathMode(stepIndex), getTopicIndex(stepIndex));
      }

      function createRound(mode, roundIndex) {
        const seed = seedFor(mode, roundIndex);
        const config = MODES[mode];

        if (mode === "letters") {
          const target = LETTERS[roundIndex % LETTERS.length];
          const visibleLetter = getVisibleLetterInWord(target.sample, target);
          const correct = {
            id: `${target.glyph}-${visibleLetter}`,
            label: visibleLetter,
            detail: target.name,
            speakText: target.sample,
            isCorrect: true,
            dir: "rtl",
          };
          const distractors = shuffleWithSeed(
            LETTERS.filter((letter) => letter.glyph !== target.glyph),
            seed,
          )
            .slice(0, 3)
            .map((letter) => ({
              id: `${letter.glyph}-${getVisibleLetterInWord(letter.sample, letter)}`,
              label: getVisibleLetterInWord(letter.sample, letter),
              detail: letter.name,
              speakText: letter.sample,
              isCorrect: false,
              dir: "rtl",
            }));

          return {
            mode,
            title: config.title,
            kicker: `${target.name} makes ${target.sound}`,
            prompt: `Find the Farsi letter for ${target.sound}`,
            promptFa: target.sample,
            highlightGlyphs: getHighlightGlyphs(target.glyph),
            hint: `${target.sample} means ${target.meaning}.`,
            speakText: target.sample,
            choices: mixChoices(correct, distractors, seed + 11),
          };
        }

        if (mode === "shapes") {
          const target = LETTERS[roundIndex % LETTERS.length];
          const shapeExample = getShapeExampleForLetter(target, roundIndex);
          const { correct: correctExample, distractors: distractorExamples } =
            getShapeChoiceExamples(target, shapeExample, seed);
          const correct = {
            id: `${target.glyph}-${getShapeExampleKey(correctExample)}`,
            label: correctExample.word.fa,
            detail: `${correctExample.position} shape`,
            speakText: correctExample.word.fa,
            isCorrect: true,
            dir: "rtl",
          };
          const distractors = distractorExamples
            .map((example, index) => ({
              id: `${target.glyph}-${getShapeExampleKey(example)}-${index}`,
              label: example.word.fa,
              detail: `${example.position} shape`,
              speakText: example.word.fa,
              isCorrect: false,
              dir: "rtl",
            }));

          return {
            mode,
            title: config.title,
            kicker: `${target.name} has a few shapes`,
            prompt: `Which word has the same ${target.name} shape?`,
            promptFa: shapeExample.word.fa,
            highlightGlyphs: getHighlightGlyphs(target.glyph),
            hint: `${shapeExample.word.fa} and ${correctExample.word.fa} use the same ${target.name} shape.`,
            speakText: shapeExample.word.fa,
            choices: mixChoices(correct, distractors, seed + 17),
          };
        }

        if (mode === "words") {
          const targetLetter = LETTERS[roundIndex % LETTERS.length];
          const target = getPracticeWordForLetter(targetLetter.glyph, roundIndex);
          const correct = {
            id: target.fa,
            label: target.fa,
            speakText: target.fa,
            isCorrect: true,
            dir: "rtl",
          };
          const distractors = shuffleWithSeed(
            PRACTICE_WORDS.filter((word) => word.fa !== target.fa),
            seed,
          )
            .slice(0, 3)
            .map((word) => ({
              id: word.fa,
              label: word.fa,
              speakText: word.fa,
              isCorrect: false,
              dir: "rtl",
            }));

          return {
            mode,
            title: config.title,
            kicker: `${target.translit} • ${targetLetter.name}`,
            prompt: `Which word says ${target.en}?`,
            promptFa: target.icon,
            highlightGlyphs: getHighlightGlyphs(targetLetter.glyph),
            hint: `Find ${targetLetter.glyph} inside ${target.fa}.`,
            speakText: target.fa,
            choices: mixChoices(correct, distractors, seed + 23),
          };
        }

        if (mode === "meaning") {
          const targetLetter = LETTERS[roundIndex % LETTERS.length];
          const target = getPracticeWordForLetter(targetLetter.glyph, roundIndex, 1);
          const correct = {
            id: target.en,
            label: target.en,
            detail: target.translit,
            icon: target.icon,
            speakText: target.fa,
            isCorrect: true,
            dir: "ltr",
          };
          const distractors = shuffleWithSeed(
            PRACTICE_WORDS.filter((word) => word.fa !== target.fa),
            seed,
          )
            .slice(0, 3)
            .map((word) => ({
              id: word.en,
              label: word.en,
              detail: word.translit,
              icon: word.icon,
              speakText: word.fa,
              isCorrect: false,
              dir: "ltr",
            }));

          return {
            mode,
            title: config.title,
            kicker: `${target.translit} • ${targetLetter.name}`,
            prompt: "Read this word",
            promptFa: target.fa,
            highlightGlyphs: getHighlightGlyphs(targetLetter.glyph),
            hint: `${target.fa} sounds like ${target.translit}. Find ${targetLetter.glyph} in the word.`,
            speakText: target.fa,
            choices: mixChoices(correct, distractors, seed + 31),
          };
        }

        throw new Error(`Unsupported mode: ${mode}`);
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "fa-IR";
        utterance.rate = 0.78;
        utterance.pitch = 1.06;
        const persianVoice =
          state.voices.find((voice) => voice.lang.toLowerCase().startsWith("fa")) ||
          state.voices.find((voice) => voice.lang.toLowerCase().includes("ir"));
        if (persianVoice) utterance.voice = persianVoice;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      function goToRound(nextIndex) {
        state.roundIndex = nextIndex;
        currentRound = createPathRound(nextIndex);
        state.selectedId = null;
        state.status = "idle";
        state.showHint = false;
        render();
      }

      function advanceRound() {
        const nextIndex = state.roundIndex + 1;
        state.maxUnlockedRound = Math.max(state.maxUnlockedRound, nextIndex);
        goToRound(nextIndex);
      }

      function handleChoice(choice) {
        if (state.status === "correct") return;
        state.selectedId = choice.id;
        speak(choice.speakText);

        if (choice.isCorrect) {
          state.status = "correct";
          const streak = state.progress.streak + 1;
          state.progress = {
            stars: state.progress.stars + 1,
            streak,
            bestStreak: Math.max(state.progress.bestStreak, streak),
            roundsWon: state.progress.roundsWon + 1,
          };
          saveProgress();
        } else {
          state.status = "wrong";
          state.progress = { ...state.progress, streak: 0 };
          saveProgress();
        }

        render();
      }

      function render() {
        const activeMode = getPathMode(state.roundIndex);
        const cycleStep = state.roundIndex % (LETTERS.length * LESSON_FLOW.length);
        const pathStep = (state.roundIndex % LESSON_FLOW.length) + 1;
        const topicNumber = (getTopicIndex(state.roundIndex) % LETTERS.length) + 1;
        const progressPercent = Math.min(100, ((cycleStep + 1) / (LETTERS.length * LESSON_FLOW.length)) * 100);
        const correctChoice = currentRound.choices.find((choice) => choice.isCorrect);

        nodes.app.className = `app ${state.status}`;
        nodes.progressBar.style.width = `${progressPercent}%`;
        nodes.stepLabel.textContent = `Step ${pathStep} of ${LESSON_FLOW.length}`;
        nodes.lessonTitle.textContent = currentRound.title;
        nodes.letterLabel.textContent = `Letter ${topicNumber} of ${LETTERS.length}`;
        nodes.backButton.disabled = state.roundIndex <= 0;
        nodes.forwardButton.disabled = state.roundIndex >= state.maxUnlockedRound;
        nodes.kicker.textContent = currentRound.kicker;
        nodes.prompt.textContent = currentRound.prompt;
        nodes.promptContent.innerHTML = highlightedText(currentRound.promptFa, currentRound.highlightGlyphs);
        nodes.hint.textContent = currentRound.hint;
        nodes.hint.className = `hint ${state.showHint ? "visible" : ""}`;
        nodes.hintButton.classList.toggle("active", state.showHint);

        nodes.answerGrid.innerHTML = "";
        currentRound.choices.forEach((choice) => {
          const isSelected = choice.id === state.selectedId;
          const stateClass = isSelected ? (choice.isCorrect ? "correct" : "wrong") : "";
          const shouldHighlightChoice = (activeMode === "words" || activeMode === "shapes") && choice.dir === "rtl";
          const button = document.createElement("button");
          button.className = `answer ${stateClass}`;
          button.type = "button";
          button.dir = choice.dir;
          button.addEventListener("click", () => handleChoice(choice));

          if (choice.icon) {
            const icon = document.createElement("span");
            icon.className = "choice-icon";
            icon.setAttribute("aria-hidden", "true");
            icon.textContent = choice.icon;
            button.appendChild(icon);
          }

          const label = document.createElement("span");
          label.className = "choice-label";
          label.innerHTML = shouldHighlightChoice
            ? highlightedText(choice.label, currentRound.highlightGlyphs)
            : escapeHtml(choice.label);
          button.appendChild(label);

          if (choice.detail && isSelected) {
            const detail = document.createElement("span");
            detail.className = "choice-detail";
            detail.textContent = choice.detail;
            button.appendChild(detail);
          }

          nodes.answerGrid.appendChild(button);
        });

        const feedback =
          state.status === "correct"
            ? "درست است! Nice reading."
            : state.status === "wrong"
              ? "Almost. Try another tile."
              : "Choose the answer";
        nodes.feedback.className = `feedback ${state.status}`;
        nodes.feedbackText.innerHTML =
          state.status === "wrong" && correctChoice
            ? `${escapeHtml(feedback)}<small>Correct answer: <b dir="${correctChoice.dir}">${
                correctChoice.dir === "rtl"
                  ? highlightedText(correctChoice.label, currentRound.highlightGlyphs)
                  : escapeHtml(correctChoice.label)
              }</b></small>`
            : escapeHtml(feedback);
        nodes.continueButton.disabled = state.status !== "correct";
        applyTextHighlights();
      }

      function renderAlphabet() {
        const letter = state.focusLetter;
        const highlights = getHighlightGlyphs(letter.glyph);
        nodes.focusName.textContent = letter.name;
        nodes.focusGlyph.textContent = letter.glyph;
        nodes.focusSound.textContent = letter.sound;
        nodes.focusWord.innerHTML = highlightedText(letter.sample, highlights);
        nodes.focusMeaning.textContent = letter.meaning;
        nodes.shapeRow.innerHTML = letter.forms.map((form) => `<span>${escapeHtml(form)}</span>`).join("");
        nodes.letterGrid.innerHTML = "";
        LETTERS.forEach((item) => {
          const button = document.createElement("button");
          button.className = `letter-tile ${item.glyph === letter.glyph ? "active" : ""}`;
          button.type = "button";
          button.setAttribute("aria-label", `${item.name}, ${item.sound}`);
          button.textContent = item.glyph;
          button.addEventListener("click", () => {
            state.focusLetter = item;
            speak(item.sample);
            renderAlphabet();
          });
          nodes.letterGrid.appendChild(button);
        });
        applyTextHighlights();
      }

      nodes.listenButton.addEventListener("click", () => speak(currentRound.speakText));
      nodes.hintButton.addEventListener("click", () => {
        state.showHint = !state.showHint;
        render();
      });
      nodes.backButton.addEventListener("click", () => goToRound(state.roundIndex - 1));
      nodes.forwardButton.addEventListener("click", () => goToRound(state.roundIndex + 1));
      nodes.continueButton.addEventListener("click", advanceRound);
      nodes.alphabetButton.addEventListener("click", () => {
        nodes.overlay.classList.add("open");
        renderAlphabet();
      });
      nodes.closeAlphabetButton.addEventListener("click", () => nodes.overlay.classList.remove("open"));
      nodes.overlay.addEventListener("click", (event) => {
        if (event.target === nodes.overlay) nodes.overlay.classList.remove("open");
      });

      if ("speechSynthesis" in window) {
        const updateVoices = () => {
          state.voices = window.speechSynthesis.getVoices();
        };
        updateVoices();
        window.speechSynthesis.addEventListener("voiceschanged", updateVoices);
      }

      render();
    </script>
  </body>
</html>
