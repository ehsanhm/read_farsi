<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f2f2d" />
    <title>Farsi Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a1117;
        --ink: #fbfcf7;
        --muted: #b5bfca;
        --line: rgba(255, 255, 255, 0.16);
        --line-strong: rgba(255, 255, 255, 0.24);
        --surface: rgba(10, 17, 23, 0.62);
        --surface-soft: rgba(8, 14, 20, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.12);
        --accent: #67e8f9;
        --accent-2: #86efac;
        --accent-3: #f9a8d4;
        --accent-ink: #05201d;
        --gradient-app: linear-gradient(135deg, #071319 0%, #0f2f2d 30%, #26345f 62%, #3a1426 100%);
        --gradient-brand: linear-gradient(135deg, #67e8f9 0%, #86efac 52%, #fde68a 100%);
        --gradient-panel: linear-gradient(135deg, rgba(103, 232, 249, 0.22), rgba(134, 239, 172, 0.14) 46%, rgba(249, 168, 212, 0.18) 100%);
        --gradient-tile-a: linear-gradient(145deg, rgba(103, 232, 249, 0.24), rgba(255, 255, 255, 0.07));
        --gradient-tile-b: linear-gradient(145deg, rgba(134, 239, 172, 0.22), rgba(255, 255, 255, 0.07));
        --gradient-tile-c: linear-gradient(145deg, rgba(249, 168, 212, 0.2), rgba(255, 255, 255, 0.07));
        --gradient-tile-d: linear-gradient(145deg, rgba(253, 230, 138, 0.18), rgba(255, 255, 255, 0.07));
        --gradient-card: linear-gradient(150deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045));
        --gradient-word: linear-gradient(135deg, rgba(103, 232, 249, 0.12), rgba(134, 239, 172, 0.08));
        --gradient-badge: linear-gradient(135deg, rgba(103, 232, 249, 0.26), rgba(134, 239, 172, 0.18));
        --shadow: 0 22px 58px rgba(0, 0, 0, 0.34);
        --font-app: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        --font-fa: "Noto Naskh Arabic", "Geeza Pro", "SF Arabic", "Noto Sans Arabic", Tahoma, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background: var(--gradient-app);
        color: var(--ink);
        font-family: var(--font-app);
      }

      body {
        min-height: 100svh;
      }

      button {
        font: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: 100%;
        min-height: 100svh;
        padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      }

      .view {
        width: min(720px, 100%);
        margin: 0 auto;
      }

      .home-view {
        min-height: calc(100svh - 36px);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .hidden {
        display: none !important;
      }

      .home-top,
      .lesson-top,
      .brand,
      .hero,
      .section-title,
      .word-card,
      .form-meta {
        display: flex;
        align-items: center;
      }

      .home-top,
      .lesson-top,
      .section-title {
        justify-content: space-between;
      }

      .brand {
        min-width: 0;
        gap: 12px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--gradient-brand);
        color: var(--accent-ink);
        font-family: var(--font-fa);
        font-size: 1.7rem;
        font-weight: 800;
        box-shadow: 0 12px 28px rgba(103, 232, 249, 0.22);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.45rem;
        line-height: 1.05;
        font-weight: 950;
      }

      .home-top p,
      .lesson-name,
      .eyebrow,
      .form-label,
      .word-card small,
      .empty-note {
        color: var(--muted);
      }

      .home-top p {
        margin-top: 3px;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .alphabet-grid {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        direction: rtl;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(8, minmax(0, 1fr));
        gap: 9px;
      }

      .alphabet-button,
      .icon-button,
      .form-card,
      .word-card,
      .game-tab,
      .game-choice {
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
      }

      .alphabet-button {
        position: relative;
        min-width: 0;
        min-height: 44px;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--gradient-tile-a);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        font-family: var(--font-fa);
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        transition:
          transform 150ms ease,
          border-color 150ms ease,
          background 150ms ease;
      }

      .alphabet-number {
        position: absolute;
        inset-block-start: 6px;
        inset-inline-start: 7px;
        min-width: 16px;
        color: rgba(255, 255, 255, 0.68);
        font-family: var(--font-app);
        font-size: 0.62rem;
        font-weight: 950;
        line-height: 1;
        text-align: center;
        direction: ltr;
      }

      .alphabet-glyph {
        direction: rtl;
      }

      .alphabet-status {
        position: absolute;
        inset-block-start: 5px;
        inset-inline-end: 6px;
        width: 16px;
        height: 16px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(134, 239, 172, 0.9);
        color: #05201d;
        font-family: var(--font-app);
        font-size: 0.65rem;
        font-weight: 950;
        opacity: 0;
        transform: scale(0.78);
        transition:
          opacity 150ms ease,
          transform 150ms ease;
      }

      .alphabet-button.is-mastered {
        border-color: rgba(134, 239, 172, 0.5);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 10px 24px rgba(134, 239, 172, 0.12);
      }

      .alphabet-button.is-mastered .alphabet-status {
        opacity: 1;
        transform: scale(1);
      }

      .alphabet-button:nth-child(4n + 2) {
        background: var(--gradient-tile-b);
      }

      .alphabet-button:nth-child(4n + 3) {
        background: var(--gradient-tile-c);
      }

      .alphabet-button:nth-child(4n) {
        background: var(--gradient-tile-d);
      }

      .alphabet-button:hover {
        border-color: rgba(255, 255, 255, 0.36);
        filter: brightness(1.12);
      }

      .alphabet-button:active,
      .form-card:active,
      .word-card:active,
      .icon-button:active,
      .game-tab:active,
      .game-choice:active {
        transform: scale(0.98);
      }

      .alphabet-button:focus-visible,
      .form-card:focus-visible,
      .word-card:focus-visible,
      .icon-button:focus-visible,
      .game-tab:focus-visible,
      .game-choice:focus-visible {
        outline: 3px solid rgba(103, 232, 249, 0.36);
        outline-offset: 2px;
      }

      .lesson-view {
        min-height: calc(100svh - 36px);
        padding-bottom: 12px;
      }

      .lesson-top {
        gap: 12px;
        justify-content: flex-start;
        margin-bottom: 12px;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        background: var(--gradient-card);
        backdrop-filter: blur(16px);
        font-size: 1.4rem;
        font-weight: 950;
      }

      .hero {
        min-height: 124px;
        display: grid;
        justify-items: center;
        gap: 8px;
        padding: 16px;
        text-align: center;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(9, 14, 22, 0.72), rgba(9, 14, 22, 0.5)),
          var(--gradient-panel);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .letter-stack {
        min-width: 0;
        display: grid;
        justify-items: center;
      }

      .lesson-name {
        display: block;
        margin-bottom: 2px;
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .big-letter {
        font-family: var(--font-fa);
        font-size: 4.9rem;
        line-height: 0.95;
        font-weight: 800;
        direction: rtl;
      }

      .sound-panel {
        min-width: 0;
        display: grid;
        gap: 5px;
        justify-items: center;
      }

      .eyebrow {
        font-size: 0.74rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .sound-text {
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: var(--accent);
        font-size: 0.95rem;
        font-weight: 950;
        white-space: nowrap;
      }

      .section {
        margin-top: 26px;
        padding-top: 22px;
        position: relative;
      }

      .section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
      }

      .section-title {
        margin-bottom: 14px;
        gap: 12px;
      }

      .section-title h2 {
        font-size: 1.22rem;
        font-weight: 950;
      }

      .section-title span {
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--gradient-badge);
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 900;
      }

      .forms-grid,
      .word-grid {
        display: grid;
        gap: 10px;
      }

      .forms-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-card {
        width: 100%;
        min-width: 0;
        min-height: 154px;
        padding: 15px;
        text-align: left;
        background:
          linear-gradient(145deg, rgba(8, 14, 20, 0.66), rgba(8, 14, 20, 0.38)),
          var(--gradient-card);
        backdrop-filter: blur(14px);
      }

      .form-meta {
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .form-label {
        padding: 5px 8px;
        border-radius: 999px;
        background: var(--gradient-badge);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .form-glyph {
        font-family: var(--font-fa);
        font-size: 2.85rem;
        font-weight: 800;
        line-height: 1;
        direction: rtl;
      }

      .form-word {
        display: grid;
        gap: 6px;
      }

      .form-word strong {
        display: block;
        font-size: 0.98rem;
        font-weight: 950;
      }

      .farsi-word {
        font-family: var(--font-fa);
        font-size: 1.75rem;
        font-weight: 700;
        line-height: 1.15;
        direction: rtl;
        unicode-bidi: isolate;
        white-space: nowrap;
      }

      .empty-note {
        font-size: 0.84rem;
        font-weight: 800;
        line-height: 1.25;
      }

      .game-shell {
        min-width: 0;
        padding: 12px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background:
          linear-gradient(150deg, rgba(7, 19, 25, 0.78), rgba(8, 14, 20, 0.54)),
          var(--gradient-panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .game-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .game-tab {
        min-width: 0;
        min-height: 48px;
        display: grid;
        grid-template-columns: 20px minmax(0, auto);
        place-content: center;
        align-items: center;
        gap: 7px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 950;
        transition:
          transform 150ms ease,
          background 150ms ease,
          color 150ms ease,
          border-color 150ms ease;
      }

      .game-tab[aria-selected="true"] {
        border-color: transparent;
        background: var(--gradient-brand);
        color: var(--accent-ink);
        box-shadow: 0 12px 26px rgba(103, 232, 249, 0.18);
      }

      .tab-icon {
        width: 20px;
        height: 20px;
        display: block;
        position: relative;
      }

      .bubble-icon {
        border-radius: 999px;
        background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.95), rgba(103, 232, 249, 0.92) 34%, rgba(103, 232, 249, 0.22) 70%);
      }

      .bridge-icon::before,
      .bridge-icon::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
      }

      .bridge-icon::before {
        top: 4px;
        transform: rotate(-8deg);
      }

      .bridge-icon::after {
        bottom: 4px;
        transform: rotate(8deg);
      }

      .jump-icon {
        border-radius: 50% 50% 45% 45%;
        background: currentColor;
      }

      .jump-icon::after {
        content: "";
        position: absolute;
        right: -5px;
        bottom: -2px;
        width: 13px;
        height: 5px;
        border-radius: 999px;
        background: currentColor;
        transform: rotate(-16deg);
      }

      .game-stage {
        min-height: 322px;
        position: relative;
        padding: 12px;
        border-radius: 8px;
        background:
          radial-gradient(circle at top left, rgba(103, 232, 249, 0.16), transparent 34%),
          radial-gradient(circle at bottom right, rgba(249, 168, 212, 0.14), transparent 35%),
          rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .quest-hud {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }

      .quest-stats {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 950;
      }

      .heart-row,
      .streak-pill {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .heart-dot {
        width: 12px;
        height: 12px;
        border-radius: 50% 50% 46% 46%;
        background: var(--accent-3);
        box-shadow: 0 0 16px rgba(249, 168, 212, 0.34);
        transform: rotate(45deg);
      }

      .heart-dot.is-empty {
        background: rgba(255, 255, 255, 0.16);
        box-shadow: none;
      }

      .quest-meter {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.11);
      }

      .quest-meter span {
        width: var(--quest-progress, 0%);
        height: 100%;
        display: block;
        border-radius: inherit;
        background: var(--gradient-brand);
        box-shadow: 0 0 20px rgba(103, 232, 249, 0.28);
        transition: width 240ms ease;
      }

      .quest-scene {
        min-height: 132px;
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr) 76px;
        align-items: center;
        gap: 12px;
        padding: 13px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 8px;
        background:
          radial-gradient(circle at 14% 18%, rgba(253, 230, 138, 0.16), transparent 32%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
      }

      .mascot-orb {
        width: 66px;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 24px 24px 20px 20px;
        background: var(--gradient-brand);
        color: var(--accent-ink);
        font-family: var(--font-fa);
        font-size: 2.6rem;
        font-weight: 800;
        line-height: 1;
        direction: rtl;
        box-shadow: 0 18px 34px rgba(103, 232, 249, 0.2);
        animation: mascotBounce 2.8s ease-in-out infinite;
      }

      .quest-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .quest-copy strong {
        font-size: 1.08rem;
        font-weight: 950;
      }

      .quest-copy small {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 850;
        line-height: 1.25;
      }

      .target-card {
        min-width: 0;
        display: grid;
        justify-items: center;
        gap: 5px;
        padding: 9px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
      }

      .target-card strong {
        font-family: var(--font-fa);
        color: var(--accent);
        font-size: 2.35rem;
        font-weight: 800;
        line-height: 1;
        direction: rtl;
      }

      .target-card small {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .quest-track {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 5px;
        margin: 11px 0;
      }

      .quest-step {
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.13);
      }

      .quest-step.is-done {
        background: var(--gradient-brand);
        box-shadow: 0 0 14px rgba(103, 232, 249, 0.24);
      }

      .quest-choices {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .quest-choices .game-choice {
        min-height: 70px;
      }

      .level-complete {
        min-height: 294px;
        display: grid;
        place-items: center;
        gap: 12px;
        padding: 18px;
        text-align: center;
      }

      .reward-badge {
        width: 96px;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: var(--gradient-brand);
        color: var(--accent-ink);
        font-family: var(--font-fa);
        font-size: 3.7rem;
        font-weight: 800;
        line-height: 1;
        direction: rtl;
        box-shadow: 0 22px 50px rgba(103, 232, 249, 0.26);
        animation: rewardPop 520ms cubic-bezier(0.2, 1.5, 0.35, 1);
      }

      .level-complete strong {
        font-size: 1.22rem;
        font-weight: 950;
      }

      .level-complete p {
        max-width: 28rem;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 850;
        line-height: 1.35;
      }

      .quest-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .quest-action {
        min-height: 48px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--gradient-brand);
        color: var(--accent-ink);
        cursor: pointer;
        font-weight: 950;
      }

      .quest-action.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.09);
        color: var(--ink);
      }

      .game-prompt {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .game-prompt strong {
        font-size: 0.98rem;
        font-weight: 950;
      }

      .game-target {
        min-width: 58px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: var(--accent);
        font-family: var(--font-fa);
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        direction: rtl;
      }

      .game-feedback {
        min-height: 20px;
        margin-top: 8px;
        color: var(--accent-2);
        font-size: 0.84rem;
        font-weight: 950;
        text-align: right;
      }

      .bubble-field {
        position: relative;
        min-height: 176px;
      }

      .bubble {
        width: min(34%, 112px);
        aspect-ratio: 1;
        position: absolute;
        display: grid;
        place-items: center;
        padding: 8px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.92), rgba(103, 232, 249, 0.42) 28%, rgba(103, 232, 249, 0.16) 70%),
          rgba(255, 255, 255, 0.08);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.4),
          0 16px 32px rgba(0, 0, 0, 0.24);
        animation: floatBubble 3.8s ease-in-out infinite;
      }

      .bubble:nth-child(1) {
        left: 1%;
        top: 8%;
      }

      .bubble:nth-child(2) {
        left: 34%;
        top: 1%;
        animation-delay: -1.1s;
      }

      .bubble:nth-child(3) {
        right: 1%;
        top: 17%;
        animation-delay: -2.2s;
      }

      .bubble:nth-child(4) {
        left: 13%;
        bottom: 0;
        animation-delay: -0.6s;
      }

      .bubble:nth-child(5) {
        right: 16%;
        bottom: 4%;
        animation-delay: -1.7s;
      }

      .bubble .farsi-word {
        font-size: clamp(1.08rem, 5vw, 1.45rem);
      }

      .bridge-track {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        align-items: end;
        gap: 6px;
        min-height: 58px;
        margin: 6px 0 12px;
      }

      .bridge-plank {

        height: 38px;

        background: var(--gradient-brand);
        box-shadow: 0 10px 24px rgba(103, 232, 249, 0.2);

        content: "";
        position: absolute;
        right: -10px;
        bottom: 3px;
        width: 18px;
        height: 7px;
        border-radius: 999px;
        background: #fde68a;
        transform: rotate(-16deg);

        width: 24px;
        height: 32px;
        position: absolute;
        right: 9%;
        bottom: 6px;
        border-radius: 6px 6px 2px 2px;
        background: rgba(249, 168, 212, 0.72);
      }

        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .stone {
        min-height: 66px;
        border-radius: 999px;
      }

        border-color: rgba(134, 239, 172, 0.74);
        filter: brightness(1.24);
        transform: scale(1.05);
      }

      .game-choice.is-miss {
        border-color: rgba(249, 168, 212, 0.84);
        animation: shakeChoice 190ms ease-in-out;

        grid-template-columns: 1fr;
      }

        width: 100%;
        min-height: 76px;
        justify-content: space-between;
        gap: 14px;
        padding: 15px;

        margin-top: 3px;
        font-size: 0.82rem;

        { kind: "build", title: "Make it stronger", subtitle: "Choose carefully." },
        { kind: "dash", title: "Almost there", subtitle: "One more clean read." },
        { kind: "boss", title: "Final gate", subtitle: "Clear the letter." },
      ];

      const nodes = {
        homeView: document.getElementById("homeView"),
        lessonView: document.getElementById("lessonView"),
        alphabetGrid: document.getElementById("alphabetGrid"),
        backButton: document.getElementById("backButton"),
        letterName: document.getElementById("letterName"),
        letterGlyph: document.getElementById("letterGlyph"),
        soundText: document.getElementById("soundText"),
        formsCount: document.getElementById("formsCount"),
        formsGrid: document.getElementById("formsGrid"),
        gameScore: document.getElementById("gameScore"),
        gameStage: document.getElementById("gameStage"),
      };

      let currentIndex = 0;
      let savedProgress = loadProgress();
      let gameState = {
        round: 0,
        score: 0,
        hearts: MAX_HEARTS,
        streak: 0,
        misses: 0,
        feedback: "",
        complete: false,
      };

      function getFormPosition(form) {
        const joinsBefore = form.startsWith(TATWEEL);
        const joinsAfter = form.endsWith(TATWEEL);
        if (joinsBefore && joinsAfter) return "medial";
        if (joinsAfter) return "initial";
        if (joinsBefore) return "final";
        return "isolated";
      }

      function getHighlightGlyphs(letterGlyph) {
        const letter = LETTERS.find((item) => item.glyph === letterGlyph);
        const forms = letter ? [letter.glyph, ...letter.forms] : [letterGlyph];
        return Array.from(new Set(forms.flatMap((form) => Array.from(form.replaceAll(TATWEEL, ""))).filter(Boolean)));
      }

      function isKnownLetter(character) {
        return LETTERS.some((letter) => getHighlightGlyphs(letter.glyph).includes(character));
      }

      function connectsAfter(character) {
        return isKnownLetter(character) && !NON_CONNECTING_AFTER.has(character);
      }

      function connectsBefore(character) {
        return isKnownLetter(character);
      }

      function getFormForPosition(letter, position, actualCharacter) {
        return (
          letter.forms.find(
            (form) =>
              getFormPosition(form) === position &&
              form.replaceAll(TATWEEL, "") === actualCharacter,
          ) ||
          letter.forms.find((form) => getFormPosition(form) === position) ||
          actualCharacter
        );
      }

      function getLetterOccurrencesInWord(word, letter) {
        const acceptedGlyphs = new Set(getHighlightGlyphs(letter.glyph));
        const characters = Array.from(word.fa);

        return characters.flatMap((character, index) => {
          if (!acceptedGlyphs.has(character)) return [];

          const previous = characters[index - 1];
          const next = characters[index + 1];
          const joinsBefore = Boolean(previous && connectsAfter(previous) && connectsBefore(character));
          const joinsAfter = Boolean(next && connectsAfter(character) && connectsBefore(next));
          const position =
            joinsBefore && joinsAfter
              ? "medial"
              : joinsAfter
                ? "initial"
                : joinsBefore
                  ? "final"
                  : "isolated";

          return [
            {
              word,
              form: getFormForPosition(letter, position, character),
              position,
            },
          ];
        });
      }

      function getWordsContainingLetter(words, letter) {
        const acceptedGlyphs = new Set(getHighlightGlyphs(letter.glyph));
        const seen = new Set();
        return words.filter((word) => {
          if (seen.has(word.fa)) return false;
          const hasLetter = Array.from(word.fa).some((character) => acceptedGlyphs.has(character));
          if (hasLetter) seen.add(word.fa);
          return hasLetter;
        });
      }

      function getWordsForLetter(letter) {
        return getWordsContainingLetter(WORDS, letter);
      }

      function getFormWordsForLetter(letter) {
        return getWordsContainingLetter([...WORDS, ...FORM_WORDS], letter);
      }

      function getFormLessons(letter) {
        const examples = getFormWordsForLetter(letter).flatMap((word) => getLetterOccurrencesInWord(word, letter));
        return letter.forms.map((form) => {
          const example = examples.find((item) => item.form === form);
          return {
            form,
            position: getFormPosition(form),
            example,
          };
        });
      }

      function getFormLabel(letter, form) {
        if (letter.glyph === "ا" && form === "آ") return "Long aa";
        return FORM_LABELS[getFormPosition(form)];
      }

      function loadProgress() {
        if (typeof localStorage === "undefined") return {};
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        } catch {
          return {};
        }
      }

      function saveProgress() {
        if (typeof localStorage === "undefined") return;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(savedProgress));
        } catch {
          return;
        }
      }

      function saveLetterProgress(index, stars) {
        const current = savedProgress[index] || {};
        savedProgress[index] = {
          complete: true,
          stars: Math.max(current.stars || 0, stars),
        };
        saveProgress();
        renderHome();
      }

      function resetGameState() {
        gameState = {
          round: 0,
          score: 0,
          hearts: MAX_HEARTS,
          streak: 0,
          misses: 0,
          feedback: "",
          complete: false,
        };
      }

      function shuffle(items) {
        const next = [...items];
        for (let index = next.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
        }
        return next;
      }

      function uniqueWords(words) {
        const seen = new Set();
        return words.filter((word) => {
          if (seen.has(word.fa)) return false;
          seen.add(word.fa);
          return true;
        });
      }

      function wordHasForm(word, letter, form) {
        return getLetterOccurrencesInWord(word, letter).some((item) => item.form === form);
      }

      function getGameItems(letter) {
        const seen = new Set();
        const lessons = getFormLessons(letter)
          .filter((lesson) => lesson.example)
          .filter((lesson) => {
            const key = `${lesson.form}-${lesson.example.word.fa}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });

        if (lessons.length) {
          return lessons.map((lesson) => ({
            form: lesson.form,
            label: getFormLabel(letter, lesson.form),
            position: lesson.position,
            word: lesson.example.word,
          }));
        }

        return [
          {
            form: letter.glyph,
            label: "Letter",
            position: "isolated",
            word: getWordsForLetter(letter)[0] || WORDS[0],
          },
        ];
      }

      function getDistractorWords(letter, target) {
        const allWords = uniqueWords([...getFormWordsForLetter(letter), ...WORDS, ...FORM_WORDS]);
        const sameLetterWords = allWords.filter(
          (word) =>
            word.fa !== target.word.fa &&
            getLetterOccurrencesInWord(word, letter).length > 0 &&
            !wordHasForm(word, letter, target.form),
        );
        const otherWords = allWords.filter(
          (word) =>
            word.fa !== target.word.fa &&
            !wordHasForm(word, letter, target.form) &&
            !sameLetterWords.some((sameLetterWord) => sameLetterWord.fa === word.fa),
        );

        return uniqueWords([...shuffle(sameLetterWords), ...shuffle(otherWords)]);
      }

      function getRoundTarget(letter) {
        const items = getGameItems(letter);
        return items[gameState.round % items.length];
      }

      function getRoundChoices(letter, target, count) {
        const distractors = getDistractorWords(letter, target).slice(0, count - 1);
        return shuffle([target.word, ...distractors]).map((word) => ({
          word,
          isCorrect: word.fa === target.word.fa,
        }));
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function audioSlug(value) {
        return value
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function getWordAudioPath(word) {
        if (word.audio === false) return "";
        return `audio/words/${audioSlug(word.translit)}.mp3`;
      }

      function wordMarkup(word, letter) {
        const glyphs = getHighlightGlyphs(letter.glyph).join("");
        return `<span class="farsi-word" dir="rtl" data-highlight-glyphs="${escapeHtml(glyphs)}">${escapeHtml(word.fa)}</span>`;
      }

      function getQuestStep() {
        return QUEST_STEPS[Math.min(gameState.round, QUEST_STEPS.length - 1)];
      }

      function getEarnedStars() {
        if (gameState.misses === 0) return 3;
        if (gameState.misses <= 2) return 2;
        return 1;
      }

      function renderHearts() {
        return Array.from(
          { length: MAX_HEARTS },
          (_, index) => `<span class="heart-dot ${index < gameState.hearts ? "" : "is-empty"}" aria-hidden="true"></span>`,
        ).join("");
      }

      function renderQuestTrack() {
        return Array.from(
          { length: LEVEL_ROUNDS },
          (_, index) => `<span class="quest-step ${index < gameState.round ? "is-done" : ""}"></span>`,
        ).join("");
      }

      function renderGameFeedback() {
        return `<div class="game-feedback">${escapeHtml(gameState.feedback)}</div>`;
      }

      function renderGameChoice(choice, letter) {
        return `
          <button class="game-choice" type="button" data-game-choice data-correct="${choice.isCorrect}" data-audio="${getWordAudioPath(choice.word)}" data-speak="${escapeHtml(choice.word.fa)}">
            ${wordMarkup(choice.word, letter)}
          </button>
        `;
      }

      function renderQuestHud() {
        const progress = Math.round((gameState.round / LEVEL_ROUNDS) * 100);
        return `
          <div class="quest-hud">
            <div class="quest-stats">
              <span class="heart-row">${renderHearts()}</span>
              <span class="streak-pill">Streak ${gameState.streak}</span>
            </div>
            <div class="quest-meter" style="--quest-progress: ${progress}%"><span></span></div>
          </div>
        `;
      }

      function renderQuestScene(letter, target, step) {
        return `
          <div class="quest-scene quest-${step.kind}">
            <div class="mascot-orb" dir="rtl" aria-hidden="true">${escapeHtml(letter.glyph)}</div>
            <div class="quest-copy">
              <strong>${escapeHtml(step.title)}</strong>
              <small>${escapeHtml(step.subtitle)}</small>
            </div>
            <div class="target-card">
              <strong dir="rtl">${escapeHtml(target.form)}</strong>
              <small>${escapeHtml(target.label)}</small>
            </div>
          </div>
        `;
      }

      function renderLevelComplete(letter) {
        const stars = getEarnedStars();
        nodes.gameScore.textContent = `${stars} stars`;
        return `
          <div class="level-complete">
            <div class="reward-badge" dir="rtl">${escapeHtml(letter.glyph)}</div>
            <strong>Letter cleared</strong>
            <p>${escapeHtml(letter.name)} cleared with ${stars} star${stars === 1 ? "" : "s"}.</p>
            <div class="quest-actions">
              <button class="quest-action secondary" type="button" data-game-action="replay">Replay</button>
              <button class="quest-action" type="button" data-game-action="next">Next letter</button>
            </div>
          </div>
        `;
      }

      function renderGame() {
        const letter = LETTERS[currentIndex];
        nodes.gameStage.dataset.busy = "false";

        if (gameState.complete) {
          nodes.gameStage.innerHTML = renderLevelComplete(letter);
          return;
        }

        const target = getRoundTarget(letter);
        const step = getQuestStep();
        const choices = getRoundChoices(letter, target, step.kind === "boss" ? 5 : 4);

        nodes.gameScore.textContent = `${gameState.round}/${LEVEL_ROUNDS}`;
        nodes.gameStage.innerHTML = `
          ${renderQuestHud()}
          ${renderQuestScene(letter, target, step)}
          <div class="quest-track" aria-hidden="true">${renderQuestTrack()}</div>
          <div class="choice-grid quest-choices">
            ${choices.map((choice) => renderGameChoice(choice, letter)).join("")}
          </div>
          ${renderGameFeedback()}
        `;
        applyTextHighlights();
      }

      function completeGame() {
        gameState.complete = true;
        gameState.feedback = "";
        saveLetterProgress(currentIndex, getEarnedStars());
        renderGame();
      }

      function advanceGame() {
        gameState.round += 1;
        gameState.streak += 1;
        gameState.score += 10 + Math.min(gameState.streak, 5) * 2;
        gameState.feedback = gameState.streak >= 3 ? `Combo ${gameState.streak}` : "Nice";

        if (gameState.round >= LEVEL_ROUNDS) {
          completeGame();
          return;
        }

        renderGame();
      }

      function missGameChoice(button) {
        button.classList.add("is-miss");
        gameState.misses += 1;
        gameState.streak = 0;
        gameState.hearts -= 1;
        gameState.feedback = gameState.hearts <= 0 ? "Hearts refilled" : "Try again";
        if (gameState.hearts <= 0) gameState.hearts = MAX_HEARTS;
        window.setTimeout(renderGame, 240);
      }

      function handleGameChoice(button) {
        if (nodes.gameStage.dataset.busy === "true" || gameState.complete) return;

        const isCorrect = button.dataset.correct === "true";
        if (!isCorrect) {
          missGameChoice(button);
          return;
        }

        nodes.gameStage.dataset.busy = "true";
        button.classList.add("is-hit");
        playAudio(button.dataset.audio, button.dataset.speak);
        window.setTimeout(advanceGame, 300);
      }

      function handleGameAction(action) {
        if (action === "replay") {
          resetGameState();
          renderGame();
          return;
        }

        if (action === "next") {
          resetGameState();
          goToLetter((currentIndex + 1) % LETTERS.length);
        }
      }

      function renderHome() {
        nodes.alphabetGrid.innerHTML = LETTERS.map(
          (letter, index) => {
            const isMastered = Boolean(savedProgress[index]?.complete);
            return `<button class="alphabet-button ${isMastered ? "is-mastered" : ""}" type="button" data-index="${index}" aria-label="${index + 1}. ${letter.name}">
              <span class="alphabet-number">${index + 1}</span>
              <span class="alphabet-glyph">${letter.glyph}</span>
              <span class="alphabet-status" aria-hidden="true">✓</span>
            </button>`;
          },
        ).join("");
      }

      function renderLetter(index) {
        const nextIndex = (index + LETTERS.length) % LETTERS.length;
        if (nextIndex !== currentIndex) resetGameState();
        currentIndex = nextIndex;
        const letter = LETTERS[currentIndex];
        const formLessons = getFormLessons(letter);

        nodes.letterName.textContent = `${letter.name} letter`;
        nodes.letterGlyph.textContent = letter.glyph;
        nodes.soundText.textContent = letter.sound;
        nodes.formsCount.textContent = "Tap to hear";

        nodes.formsGrid.innerHTML = formLessons
          .map((lesson) => {
            const detail = lesson.example
              ? `<div class="form-word">
                  ${wordMarkup(lesson.example.word, letter)}
                  <span>
                    <strong>${escapeHtml(lesson.example.word.en)}</strong>
                  </span>
                </div>`
              : `<p class="empty-note">Shown by itself</p>`;

            return `
              <button class="form-card" type="button" data-audio="${lesson.example ? getWordAudioPath(lesson.example.word) : ""}" data-speak="${lesson.example ? escapeHtml(lesson.example.word.fa) : ""}">
                <div class="form-meta">
                  <span class="form-label">${getFormLabel(letter, lesson.form)}</span>
                  <span class="form-glyph" dir="rtl">${lesson.form}</span>
                </div>
                ${detail}
              </button>
            `;
          })
          .join("");

        nodes.homeView.classList.add("hidden");
        nodes.lessonView.classList.remove("hidden");
        renderGame();
      }

      function showHome() {
        nodes.lessonView.classList.add("hidden");
        nodes.homeView.classList.remove("hidden");
        if (location.hash) {
          history.pushState("", document.title, location.pathname + location.search);
        }
      }

      function syncRoute() {
        const match = location.hash.match(/^#letter-(\d+)$/);
        if (!match) {
          showHome();
          return;
        }

        const index = Number(match[1]);
        if (Number.isInteger(index) && index >= 0 && index < LETTERS.length) {
          renderLetter(index);
        } else {
          showHome();
        }
      }

      function goToLetter(index) {
        const nextIndex = (index + LETTERS.length) % LETTERS.length;
        location.hash = `letter-${nextIndex}`;
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "fa-IR";
        utterance.rate = 0.82;
        utterance.pitch = 1.05;
        const voices = window.speechSynthesis.getVoices();
        utterance.voice = voices.find((voice) => voice.lang.toLowerCase().startsWith("fa")) || null;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      let activeAudio = null;

      function playAudio(path, fallbackText) {
        if (activeAudio) {
          activeAudio.pause();
          activeAudio.currentTime = 0;
        }

        if (!path) {
          speak(fallbackText);
          return;
        }

        activeAudio = new Audio(path);
        activeAudio.play().catch(() => speak(fallbackText));
      }

      function applyTextHighlights() {
        if (!("Highlight" in window) || !("CSS" in window) || !CSS.highlights) return;

        const ranges = [];
        document.querySelectorAll(".farsi-word[data-highlight-glyphs]").forEach((element) => {
          const highlightSet = new Set(Array.from(element.dataset.highlightGlyphs || ""));
          const textNode = element.firstChild;
          if (!textNode || textNode.nodeType !== Node.TEXT_NODE) return;

          let offset = 0;
          Array.from(textNode.textContent || "").forEach((character) => {
            const nextOffset = offset + character.length;
            if (highlightSet.has(character)) {
              const range = new Range();
              range.setStart(textNode, offset);
              range.setEnd(textNode, nextOffset);
              ranges.push(range);
            }
            offset = nextOffset;
          });
        });

        CSS.highlights.set("farsi-letter", new Highlight(...ranges));
      }

      nodes.alphabetGrid.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-index]");
        if (!button) return;
        goToLetter(Number(button.dataset.index));
      });

      nodes.backButton.addEventListener("click", showHome);
      nodes.formsGrid.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-speak]");
        if (!button) return;
        playAudio(button.dataset.audio, button.dataset.speak);
      });
      nodes.gameStage.addEventListener("click", (event) => {
        const actionButton = event.target.closest("button[data-game-action]");
        if (actionButton) {
          handleGameAction(actionButton.dataset.gameAction);
          return;
        }

        const button = event.target.closest("button[data-game-choice]");
        if (!button) return;
        handleGameChoice(button);
      });

      window.addEventListener("hashchange", syncRoute);
      window.speechSynthesis?.addEventListener?.("voiceschanged", () => {});

      renderHome();
      syncRoute();
    </script>
  </body>
</html>
